    function parseDateStr(dateValue) {
        if (dateValue === null || dateValue === undefined || dateValue === "") return null;
        if (dateValue instanceof Date && !isNaN(dateValue)) return dateValue;

        if (typeof dateValue === 'number') {
            let excelDate = XLSX.SSF.parse_date_code(dateValue);
            if (excelDate) {
                return new Date(
                    excelDate.y,
                    excelDate.m - 1,
                    excelDate.d,
                    excelDate.H || 0,
                    excelDate.M || 0,
                    excelDate.S || 0
                );
            }
        }

        let dateStr = String(dateValue).trim();
        if (!dateStr) return null;

        let normalized = dateStr.replace(/\s+/g, ' ').trim();

        let monthNameMatch = normalized.match(/^(\d{1,2})[\s\-./]*([A-Za-z]{3,})[\s\-./]*(\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?)?$/i);
        if (monthNameMatch) {
            let day = parseInt(monthNameMatch[1], 10);
            let monthToken = monthNameMatch[2].slice(0, 3).toLowerCase();
            let year = parseInt(monthNameMatch[3], 10);
            let hours = parseInt(monthNameMatch[4] || '0', 10);
            let minutes = parseInt(monthNameMatch[5] || '0', 10);
            let seconds = parseInt(monthNameMatch[6] || '0', 10);
            let meridiem = (monthNameMatch[7] || '').toUpperCase();
            let monthLookup = {
                jan: 1, feb: 2, mar: 3, apr: 4, may: 5, jun: 6,
                jul: 7, aug: 8, sep: 9, oct: 10, nov: 11, dec: 12
            };
            let month = monthLookup[monthToken];

            if (year < 100) year += 2000;
            if (meridiem === 'PM' && hours < 12) hours += 12;
            if (meridiem === 'AM' && hours === 12) hours = 0;

            if (month && day >= 1 && day <= 31) {
                return new Date(year, month - 1, day, hours, minutes, seconds);
            }
        }

        let monthYearMatch = normalized.match(/^([A-Za-z]{3,})[\s\-./]*(\d{2,4})$/i);
        if (monthYearMatch) {
            let monthToken = monthYearMatch[1].slice(0, 3).toLowerCase();
            let year = parseInt(monthYearMatch[2], 10);
            let monthLookup = {
                jan: 1, feb: 2, mar: 3, apr: 4, may: 5, jun: 6,
                jul: 7, aug: 8, sep: 9, oct: 10, nov: 11, dec: 12
            };
            let month = monthLookup[monthToken];

            if (year < 100) year += 2000;
            if (month) {
                return new Date(year, month - 1, 1);
            }
        }

        let dateTimeMatch = normalized.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?)?$/i);
        if (dateTimeMatch) {
            let day = parseInt(dateTimeMatch[1], 10);
            let month = parseInt(dateTimeMatch[2], 10);
            let year = parseInt(dateTimeMatch[3], 10);
            let hours = parseInt(dateTimeMatch[4] || '0', 10);
            let minutes = parseInt(dateTimeMatch[5] || '0', 10);
            let seconds = parseInt(dateTimeMatch[6] || '0', 10);
            let meridiem = (dateTimeMatch[7] || '').toUpperCase();

            if (year < 100) year += 2000;

            if (meridiem === 'PM' && hours < 12) hours += 12;
            if (meridiem === 'AM' && hours === 12) hours = 0;

            if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                return new Date(year, month - 1, day, hours, minutes, seconds);
            }
        }

        let isoMatch = normalized.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
        if (isoMatch) {
            let year = parseInt(isoMatch[1], 10);
            let month = parseInt(isoMatch[2], 10);
            let day = parseInt(isoMatch[3], 10);
            let hours = parseInt(isoMatch[4] || '0', 10);
            let minutes = parseInt(isoMatch[5] || '0', 10);
            let seconds = parseInt(isoMatch[6] || '0', 10);

            if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                return new Date(year, month - 1, day, hours, minutes, seconds);
            }
        }

        return null;
    }

    function getDateCellValue(cell) {
        if (!cell) return "";

        let displayValue = cell.w || "";
        let rawValue = cell.v;

        if (displayValue && parseDateStr(displayValue)) return displayValue;
        return rawValue;
    }

    function getCellDisplayValue(cell, isDateField) {
        if (!cell) return "";

        if (isDateField) return getDateCellValue(cell);

        // Excel error cells like #N/A often expose raw numeric codes (for example 42).
        // Prefer the formatted text so those rows can be filtered correctly.
        if (cell.t === 'e' && cell.w) return cell.w;

        return cell.v;
    }

    function parseNumericValue(value) {
        if (value === null || value === undefined || value === "") return 0;
        if (typeof value === 'number') return value;

        let parsed = parseFloat(String(value).replace(/,/g, '').trim());
        return isNaN(parsed) ? 0 : parsed;
    }

    function buildMonthKeyFromDate(dateObj) {
        if (!dateObj || isNaN(dateObj)) return "Unknown Date";

        let year = dateObj.getFullYear();
        let monthNum = String(dateObj.getMonth() + 1).padStart(2, '0');
        let monthName = dateObj.toLocaleString('default', { month: 'short' });
        return `${year}-${monthNum} (${monthName})`;
    }

    function buildMonthKey(year, month) {
        let monthNum = String(month).padStart(2, '0');
        let monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${year}-${monthNum} (${monthNames[month - 1]})`;
    }

    function extractMonthKeyFromValue(value) {
        if (value === null || value === undefined || value === "") return null;

        if (typeof value === 'number') {
            let excelDate = XLSX.SSF.parse_date_code(value);
            if (excelDate && excelDate.y && excelDate.m) {
                return buildMonthKey(excelDate.y, excelDate.m);
            }
        }

        if (value instanceof Date && !isNaN(value)) {
            return buildMonthKey(value.getFullYear(), value.getMonth() + 1);
        }

        let text = String(value).replace(/\s+/g, ' ').trim();
        if (!text) return null;

        let monthLookup = {
            jan: 1, feb: 2, mar: 3, apr: 4, may: 5, jun: 6,
            jul: 7, aug: 8, sep: 9, oct: 10, nov: 11, dec: 12
        };

        let isoMatch = text.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
        if (isoMatch) {
            let year = parseInt(isoMatch[1], 10);
            let month = parseInt(isoMatch[2], 10);
            if (month >= 1 && month <= 12) return buildMonthKey(year, month);
        }

        let dayFirstMatch = text.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{2,4})/);
        if (dayFirstMatch) {
            let month = parseInt(dayFirstMatch[2], 10);
            let year = parseInt(dayFirstMatch[3], 10);
            if (year < 100) year += 2000;
            if (month >= 1 && month <= 12) return buildMonthKey(year, month);
        }

        let monthNameDayMatch = text.match(/^(\d{1,2})[\s\-./]*([A-Za-z]{3,})[\s\-./]*(\d{2,4})/i);
        if (monthNameDayMatch) {
            let month = monthLookup[monthNameDayMatch[2].slice(0, 3).toLowerCase()];
            let year = parseInt(monthNameDayMatch[3], 10);
            if (year < 100) year += 2000;
            if (month) return buildMonthKey(year, month);
        }

        let monthNameYearMatch = text.match(/^([A-Za-z]{3,})[\s\-./]*(\d{2,4})$/i);
        if (monthNameYearMatch) {
            let month = monthLookup[monthNameYearMatch[1].slice(0, 3).toLowerCase()];
            let year = parseInt(monthNameYearMatch[2], 10);
            if (year < 100) year += 2000;
            if (month) return buildMonthKey(year, month);
        }

        return null;
    }

    function getParsedDateFromCell(cell) {
        if (!cell) return null;

        if (typeof cell.v === 'number') {
            let excelDate = XLSX.SSF.parse_date_code(cell.v);
            if (excelDate) {
                return new Date(
                    excelDate.y,
                    excelDate.m - 1,
                    excelDate.d,
                    excelDate.H || 0,
                    excelDate.M || 0,
                    excelDate.S || 0
                );
            }
        }

        if (cell.v instanceof Date && !isNaN(cell.v)) {
            return cell.v;
        }

        if (cell.w) {
            let parsedDisplayDate = parseDateStr(cell.w);
            if (parsedDisplayDate) return parsedDisplayDate;
        }

        return parseDateStr(cell.v);
    }

    function getMonthKeyFromCell(cell) {
        if (!cell) return "Unknown Date";

        let monthKeyFromDisplay = extractMonthKeyFromValue(cell.w);
        if (monthKeyFromDisplay) return monthKeyFromDisplay;

        let monthKeyFromRaw = extractMonthKeyFromValue(cell.v);
        if (monthKeyFromRaw) return monthKeyFromRaw;

        return "Unknown Date";
    }

    function isHeaderRow(mappedRow, config) {
        return Object.entries(config.headerChecks).every(([fieldName, allowedValues]) => {
            let cellValue = String(mappedRow[fieldName] || "").trim().toLowerCase();
            return allowedValues.includes(cellValue);
        });
    }

    function mapWorksheetRows(sheet, config) {
        if (!sheet['!ref']) return [];

        let range = XLSX.utils.decode_range(sheet['!ref']);
        let mappedRows = [];

        for (let rowNumber = range.s.r; rowNumber <= range.e.r; rowNumber++) {
            let mappedRow = {};
            let hasAnyValue = false;

            Object.keys(config.columnMap).forEach(columnLetter => {
                let cellAddress = `${columnLetter}${rowNumber + 1}`;
                let cell = sheet[cellAddress];
                let fieldName = config.columnMap[columnLetter];
                let value = "";

                if (cell) {
                    value = getCellDisplayValue(cell, config.dateColumns.has(fieldName));
                }

                mappedRow[fieldName] = value;

                if (String(value || "").trim() !== "") {
                    hasAnyValue = true;
                }
            });

            mappedRow._monthKey = getMonthKeyFromCell(sheet[`${config.monthCellLetter}${rowNumber + 1}`]);
            mappedRow._parsedDate = getParsedDateFromCell(sheet[`${config.monthCellLetter}${rowNumber + 1}`]);
            mappedRow._gateOutMonthKey = getMonthKeyFromCell(sheet[`AD${rowNumber + 1}`]);
            mappedRow._gateOutParsedDate = getParsedDateFromCell(sheet[`AD${rowNumber + 1}`]);

            if (!hasAnyValue) continue;

            if (isHeaderRow(mappedRow, config)) {
                continue;
            }

            mappedRows.push(mappedRow);
        }

        return mappedRows;
    }

    function formatDateStandard(dateObj) {
        let day = String(dateObj.getDate()).padStart(2, '0');
        let month = String(dateObj.getMonth() + 1).padStart(2, '0');
        let year = dateObj.getFullYear();
        return `${day}-${month}-${year}`;
    }

    function normalizeText(value) {
        return String(value || "").trim();
    }

    function normalizeKey(value) {
        return normalizeText(value).toUpperCase();
    }

    function getDefinitionsForReportType(reportType) {
        return reportType === 'import' ? importReportDefinitions : exportReportDefinitions;
    }

    function switchDataMode(reportType) {
        activeReportType = reportType;
        document.getElementById('importToggleBtn').classList.toggle('active', reportType === 'import');
        document.getElementById('exportToggleBtn').classList.toggle('active', reportType === 'export');
        document.getElementById('importUploadSection').style.display = reportType === 'import' ? 'block' : 'none';
        document.getElementById('exportUploadSection').style.display = reportType === 'export' ? 'block' : 'none';

        let cached = loadedDataCache[reportType];
        if (cached.rows.length && cached.config) {
            currentRows = cached.rows;
            currentConfig = cached.config;
            activeReportKey = 'commodity';
            renderReportButtons(reportType);
            renderSelectedReport('commodity');
            document.getElementById('downloadAllBtn').style.display = 'block';
            document.getElementById('downloadCombinedBtn').style.display = loadedDataCache.import.rows.length && loadedDataCache.export.rows.length ? 'block' : 'none';
        } else {
            currentRows = [];
            currentConfig = null;
            document.getElementById('output').innerHTML = '';
            document.getElementById('reportToolbar').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('downloadOtherBtn').style.display = 'none';
            document.getElementById('downloadAllBtn').style.display = 'none';
            document.getElementById('downloadCombinedBtn').style.display = loadedDataCache.import.rows.length && loadedDataCache.export.rows.length ? 'block' : 'none';
            document.getElementById('dateRangeHeader').innerText = `${reportConfigs[reportType].label} data not loaded`;
        }
    }

    function initializeFromEmbeddedData(payload) {
        if (!payload) return;
        if (payload.loadedDataCache) loadedDataCache = payload.loadedDataCache;
        if (payload.activeReportType) activeReportType = payload.activeReportType;
        if (payload.activeReportKey) activeReportKey = payload.activeReportKey;
        switchDataMode(activeReportType || 'import');
        if (currentRows.length) {
            renderSelectedReport(activeReportKey || 'commodity');
        }
    }

    function formatMonthLabel(month) {
        if (month !== "Unknown Date") {
            let parts = month.split(' ');
            let yearStr = parts[0].split('-')[0];
            let monthName = parts[1].replace(/[()]/g, '');
            return `${monthName} ${yearStr}`;
        }
        return month;
    }

    function getSizeBucket(sizeValue) {
        let normalized = normalizeText(sizeValue).toUpperCase();
        if (normalized.includes("20")) return "20";
        if (normalized.includes("40")) return "40";
        return "";
    }

    function formatPercent(value, total) {
        if (!total || total <= 0) return '-';
        return `${Math.round((value / total) * 100)}%`;
    }

    function normalizeImportLineName(lineValue) {
        let normalized = normalizeKey(lineValue);
        if (!normalized || normalized === "#N/A") return "";
        return importLineMap[normalized] || normalizeText(lineValue);
    }

    function shouldIgnoreMonth(monthKey) {
        return !monthKey || monthKey === "Unknown Date";
    }

    function renderReportButtons(reportType) {
        let toolbar = document.getElementById('reportToolbar');
        let title = document.getElementById('reportToolbarTitle');
        let buttonsContainer = document.getElementById('reportButtons');
        let definitions = getDefinitionsForReportType(reportType);

        if (!definitions.length) {
            toolbar.style.display = 'none';
            return;
        }

        title.innerText = `${reportConfigs[reportType].label} Reports`;
        buttonsContainer.innerHTML = definitions
            .map(def => `<button class="report-btn${def.key === activeReportKey ? ' active' : ''}" data-report-key="${def.key}">${def.label}</button>`)
            .join('');

        buttonsContainer.querySelectorAll('.report-btn').forEach(button => {
            button.addEventListener('click', function() {
                renderSelectedReport(button.getAttribute('data-report-key'));
            });
        });

        toolbar.style.display = 'block';
    }

    function buildSortableHeaderCell(label, columnIndex) {
        let indicator = '';
        if (currentTableSort.columnIndex === columnIndex) {
            indicator = currentTableSort.direction === 'asc' ? 'A-Z' : 'Z-A';
        }
        return `<th><button class="sort-btn" onclick="sortCurrentTable(${columnIndex})">${label}<span class="sort-indicator">${indicator}</span></button></th>`;
    }

    function parseSortableValue(text) {
        let trimmed = String(text || '').trim();
        if (!trimmed || trimmed === '-') return { type: 'empty', value: '' };
        if (trimmed.endsWith('%')) {
            let num = parseFloat(trimmed.replace('%', ''));
            if (!isNaN(num)) return { type: 'number', value: num };
        }
        let num = parseFloat(trimmed.replace(/,/g, ''));
        if (!isNaN(num) && /^-?\d+(\.\d+)?%?$/.test(trimmed.replace(/,/g, ''))) {
            return { type: 'number', value: num };
        }
        return { type: 'string', value: trimmed.toLowerCase() };
    }

    function sortCurrentTable(columnIndex) {
        let table = document.getElementById('summaryTable');
        if (!table) return;

        let tbody = table.querySelector('tbody');
        if (!tbody) return;

        let rows = Array.from(tbody.querySelectorAll('tr'));
        if (!rows.length) return;

        let grandTotalRow = rows.pop();
        let direction = 'asc';
        if (currentTableSort.columnIndex === columnIndex && currentTableSort.direction === 'asc') {
            direction = 'desc';
        }
        currentTableSort = { columnIndex, direction };

        rows.sort((a, b) => {
            let aVal = parseSortableValue(a.children[columnIndex]?.innerText || '');
            let bVal = parseSortableValue(b.children[columnIndex]?.innerText || '');

            if (aVal.type === 'empty' && bVal.type !== 'empty') return 1;
            if (bVal.type === 'empty' && aVal.type !== 'empty') return -1;

            if (aVal.type === 'number' && bVal.type === 'number') {
                return direction === 'asc' ? aVal.value - bVal.value : bVal.value - aVal.value;
            }

            let compare = String(aVal.value).localeCompare(String(bVal.value), undefined, { numeric: true, sensitivity: 'base' });
            return direction === 'asc' ? compare : -compare;
        });

        tbody.innerHTML = '';
        rows.forEach(row => tbody.appendChild(row));
        tbody.appendChild(grandTotalRow);

        let headerButtons = table.querySelectorAll('thead .sort-btn');
        headerButtons.forEach((btn, idx) => {
            let span = btn.querySelector('.sort-indicator');
            if (!span) return;
            span.textContent = currentTableSort.columnIndex === idx ? (currentTableSort.direction === 'asc' ? 'A-Z' : 'Z-A') : '';
        });
    }

    function hasAnyLoadedData() {
        return loadedDataCache.import.rows.length > 0 || loadedDataCache.export.rows.length > 0;
    }

    function updateLoadingProgress(percent, statusText) {
        let safePercent = Math.max(0, Math.min(100, Math.round(percent)));
        document.getElementById('loadingProgressFill').style.width = `${safePercent}%`;
        document.getElementById('loadingProgressValue').innerText = `${safePercent}%`;
        if (statusText) {
            document.getElementById('loadingStatus').innerText = statusText;
        }
    }

    function showLoadingOverlay(statusText = 'Preparing file') {
        clearInterval(loadingProgressTimer);
        document.getElementById('loadingOverlay').style.display = 'flex';
        updateLoadingProgress(0, statusText);
    }

    function animateLoadingTo(targetPercent, statusText) {
        clearInterval(loadingProgressTimer);
        let current = parseInt(document.getElementById('loadingProgressValue').innerText, 10) || 0;
        loadingProgressTimer = setInterval(() => {
            if (current >= targetPercent) {
                clearInterval(loadingProgressTimer);
                loadingProgressTimer = null;
                return;
            }
            current += 1;
            updateLoadingProgress(current, statusText);
        }, 20);
    }

    function hideLoadingOverlay() {
        clearInterval(loadingProgressTimer);
        updateLoadingProgress(100, 'Completed');
        setTimeout(() => {
            document.getElementById('loadingOverlay').style.display = 'none';
        }, 200);
    }

    function collectReportSnapshots() {
        let previousState = {
            activeReportType,
            activeReportKey,
            currentRows,
            currentConfig,
            dateHeader: document.getElementById('dateRangeHeader').innerHTML,
            outputHtml: document.getElementById('output').innerHTML
        };

        let snapshots = { import: [], export: [] };

        ['import', 'export'].forEach(reportType => {
            let cache = loadedDataCache[reportType];
            if (!cache.rows.length || !cache.config) return;

            activeReportType = reportType;
            currentRows = cache.rows;
            currentConfig = cache.config;

            getDefinitionsForReportType(reportType).forEach(def => {
                renderSelectedReport(def.key);
                snapshots[reportType].push({
                    key: def.key,
                    label: def.label,
                    title: document.getElementById('dateRangeHeader').innerText,
                    tableHtml: document.getElementById('output').innerHTML
                });
            });
        });

        activeReportType = previousState.activeReportType;
        activeReportKey = previousState.activeReportKey;
        currentRows = previousState.currentRows;
        currentConfig = previousState.currentConfig;
        document.getElementById('dateRangeHeader').innerHTML = previousState.dateHeader;
        document.getElementById('output').innerHTML = previousState.outputHtml;
        renderReportButtons(activeReportType);
        renderSelectedReport(activeReportKey);

        return snapshots;
    }

    function renderGenericMatrixTable(rowHeader, rowOrder, monthOrder, matrixData, titleSuffix, includeOtherDownload, tableClass = "") {
        currentTableSort = { columnIndex: null, direction: 'asc' };
        let monthlyColumnTotals = {};
        monthOrder.forEach(month => { monthlyColumnTotals[month] = 0; });

        rowOrder.forEach(rowName => {
            monthOrder.forEach(month => {
                monthlyColumnTotals[month] += matrixData[rowName]?.[month] || 0;
            });
        });

        let visibleMonths = monthOrder.filter(month => !(month === "Unknown Date" && monthlyColumnTotals[month] === 0));
        let absoluteGrandTotal = 0;
        let html = `<table id="summaryTable" class="${tableClass}"><thead><tr>${buildSortableHeaderCell(rowHeader, 0)}`;

        visibleMonths.forEach((month, index) => {
            html += buildSortableHeaderCell(formatMonthLabel(month), index + 1);
        });
        html += buildSortableHeaderCell('Grand Total TEUs', visibleMonths.length + 1);
        html += `</tr></thead><tbody>`;

        rowOrder.forEach(rowName => {
            let rowTotal = 0;
            let hasData = false;
            let rowHtml = `<tr><td>${rowName}</td>`;

            visibleMonths.forEach(month => {
                let value = matrixData[rowName]?.[month] || 0;
                rowTotal += value;
                rowHtml += `<td>${value > 0 ? value : '-'}</td>`;
                if (value > 0) hasData = true;
            });

            rowHtml += `<td><strong>${rowTotal > 0 ? rowTotal : '-'}</strong></td></tr>`;
            absoluteGrandTotal += rowTotal;

            if (hasData) html += rowHtml;
        });

        html += `<tr class="grand-total"><td>MONTHLY TOTALS</td>`;
        visibleMonths.forEach(month => {
            html += `<td>${monthlyColumnTotals[month]}</td>`;
        });
        html += `<td>${absoluteGrandTotal}</td></tr></tbody></table>`;

        document.getElementById('output').innerHTML = html;
        document.getElementById('downloadBtn').style.display = 'block';
        document.getElementById('downloadOtherBtn').style.display = includeOtherDownload && Object.keys(otherItemsLog).length > 0 ? 'block' : 'none';
        activeDownloadName = titleSuffix;
    }

            grand.htpl20 += data.htpl20;

    function renderExportLoadedTable(monthOrder, totalsByMonth, titleSuffix) {
        currentTableSort = { columnIndex: null, direction: 'asc' };
        let html = `<table id="summaryTable"><thead><tr>`;
        html += buildSortableHeaderCell('Month', 0);
        html += buildSortableHeaderCell('20', 1);
        html += buildSortableHeaderCell('40', 2);
        html += buildSortableHeaderCell('20 %', 3);
        html += buildSortableHeaderCell('40 %', 4);
        html += buildSortableHeaderCell('Total TEUs', 5);
        html += `</tr></thead><tbody>`;

    function buildCommodityReport(rows, config) {
        let pivotData = {};
        let uniqueMonths = new Set();

        otherItemsLog = {};

        let allCommodities = [...allGroupNames, "OTHER"];
        allCommodities.forEach(g => { pivotData[g] = {}; });

        rows.forEach(row => {
            let origDesc = normalizeText(row[config.commodityField]);
            let commodityCol = origDesc.toLowerCase();
            let monthKey = row._monthKey || "Unknown Date";
            let teuValue = parseNumericValue(row[config.teusField]);

            uniqueMonths.add(monthKey);

            if (teuValue <= 0) return;

            let assignedGroup = "OTHER";
            let exactMatchGroup = exactCommodityGroupMap[origDesc.toUpperCase()];
            if (exactMatchGroup) {
                assignedGroup = exactMatchGroup;
            }

            if (!exactMatchGroup) {
                for (let j = 0; j < compiledMatchers.length; j++) {
                    if (compiledMatchers[j].regex.test(commodityCol)) {
                        assignedGroup = compiledMatchers[j].group;
                        break;
                    }
                }
            }

            if (assignedGroup === "OTHER") {
                let uniqueKey = origDesc;
                if (!otherItemsLog[uniqueKey]) {
                    otherItemsLog[uniqueKey] = { cargo: origDesc, comm: origDesc, teus: 0 };
                }
                otherItemsLog[uniqueKey].teus += teuValue;
            }

            if (!pivotData[assignedGroup][monthKey]) pivotData[assignedGroup][monthKey] = 0;
            pivotData[assignedGroup][monthKey] += teuValue;
        });

        renderGenericMatrixTable("Commodity Group", allCommodities, Array.from(uniqueMonths).sort(), pivotData, "Commodity_TEU_Summary", true);
    }

    function buildPartyWiseReport(rows, config, reportField, rowHeader, titleSuffix) {
        let matrixData = {};
        let uniqueMonths = new Set();
        let rowNames = new Set();
        let minDate = null;
        let maxDate = null;

        rows.forEach(row => {
            let monthRaw = normalizeText(row.GATE_OUT_DATE_MMMAG);
            if (!monthRaw || monthRaw === "#N/A") return;

            let monthKey = row._gateOutMonthKey || extractMonthKeyFromValue(monthRaw);
            if (!monthKey || shouldIgnoreMonth(monthKey)) return;

            let rowName = normalizeText(row[reportField]);
            if (!rowName || rowName === "#N/A") return;

            let teus = parseNumericValue(row[config.teusField]);
            if (teus <= 0) return;

            let parsedDate = row._gateOutParsedDate || parseDateStr(monthRaw);
            if (parsedDate && !isNaN(parsedDate)) {
                if (!minDate || parsedDate < minDate) minDate = parsedDate;
                if (!maxDate || parsedDate > maxDate) maxDate = parsedDate;
            }

            uniqueMonths.add(monthKey);
            rowNames.add(rowName);

            if (!matrixData[rowName]) matrixData[rowName] = {};
            if (!matrixData[rowName][monthKey]) matrixData[rowName][monthKey] = 0;
            matrixData[rowName][monthKey] += teus;
        });

        if (minDate && maxDate) {
            document.getElementById('dateRangeHeader').innerText = `${config.label} ${rowHeader} Wise Report data range: ${formatDateStandard(minDate)} to ${formatDateStandard(maxDate)}`;
        } else {
            document.getElementById('dateRangeHeader').innerText = `${config.label} ${rowHeader} Wise Report loaded`;
        }

        renderGenericMatrixTable(rowHeader, Array.from(rowNames).sort(), Array.from(uniqueMonths).sort(), matrixData, titleSuffix, false);
    }

    function sanitizeWorksheetName(name, usedNames) {
        let cleaned = name.replace(/[\\\/\?\*\[\]:]/g, ' ').replace(/\s+/g, ' ').trim();
        if (!cleaned) cleaned = 'Report';
        cleaned = cleaned.slice(0, 31);

        let base = cleaned;
        let counter = 1;
        while (usedNames.has(cleaned)) {
            let suffix = ` ${counter}`;
            cleaned = base.slice(0, Math.max(1, 31 - suffix.length)) + suffix;
            counter++;
        }
        usedNames.add(cleaned);
        return cleaned;
    }

    function getWorkbookTheme(reportType) {
        return reportType === 'import'
            ? { header: 'FFF9C4', grand: 'FFF176', firstCol: 'FFFDE7' }
            : { header: 'D9F2D9', grand: 'B7E1B0', firstCol: 'EDF7ED' };
    }

    function styleWorksheet(worksheet, rowCount, colCount, reportType) {
        let theme = getWorkbookTheme(reportType);
        let border = {
            top: { style: 'thin', color: { argb: 'FFBDBDBD' } },
            left: { style: 'thin', color: { argb: 'FFBDBDBD' } },
            bottom: { style: 'thin', color: { argb: 'FFBDBDBD' } },
            right: { style: 'thin', color: { argb: 'FFBDBDBD' } }
        };

        for (let rowIndex = 1; rowIndex <= rowCount; rowIndex++) {
            for (let colIndex = 1; colIndex <= colCount; colIndex++) {
                let cell = worksheet.getRow(rowIndex).getCell(colIndex);
                let isTitleRow = rowIndex === 1;
                let isBlankSpacer = rowIndex === 2;
                let tableHeaderRow = rowIndex === 3;
                let tableGrandRow = rowIndex === rowCount;
                let isTableArea = rowIndex >= 3;

                if (isTitleRow) {
                    cell.font = { name: 'Calibri', size: 13, bold: true };
                    cell.alignment = { vertical: 'middle', horizontal: 'left' };
                    continue;
                }

                if (isBlankSpacer) {
                    continue;
                }

                if (isTableArea) {
                    cell.border = border;
                    cell.alignment = { vertical: 'middle', horizontal: colIndex === 1 ? 'left' : 'center' };
                    cell.font = { name: 'Calibri', size: 11 };

                    if (tableHeaderRow) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: theme.header } };
                        cell.font = { name: 'Calibri', size: 11, bold: true };
                    } else if (tableGrandRow) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: theme.grand } };
                        cell.font = { name: 'Calibri', size: 11, bold: true };
                    } else if (colIndex === 1) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: theme.firstCol } };
                        cell.font = { name: 'Calibri', size: 11, bold: true };
                    }

                    if (String(cell.value || '').includes('%')) {
                        cell.font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FFC0392B' } };
                    }
                }
            }
        }

        worksheet.views = [{ state: 'frozen', xSplit: 1, ySplit: 3 }];
    }

    function styleReportBlock(worksheet, startRow, tableRowCount, colCount, reportType) {
        let theme = getWorkbookTheme(reportType);
        let border = {
            top: { style: 'thin', color: { argb: 'FFBDBDBD' } },
            left: { style: 'thin', color: { argb: 'FFBDBDBD' } },
            bottom: { style: 'thin', color: { argb: 'FFBDBDBD' } },
            right: { style: 'thin', color: { argb: 'FFBDBDBD' } }
        };

        let titleRow = startRow;
        let spacerRow = startRow + 1;
        let headerRow = startRow + 2;
        let grandRow = startRow + 1 + tableRowCount;

        for (let rowIndex = titleRow; rowIndex <= grandRow; rowIndex++) {
            for (let colIndex = 1; colIndex <= colCount; colIndex++) {
                let cell = worksheet.getRow(rowIndex).getCell(colIndex);

                if (rowIndex === titleRow) {
                    cell.font = { name: 'Calibri', size: 13, bold: true };
                    cell.alignment = { vertical: 'middle', horizontal: 'left' };
                    continue;
                }

                if (rowIndex === spacerRow) continue;

                cell.border = border;
                cell.alignment = { vertical: 'middle', horizontal: colIndex === 1 ? 'left' : 'center' };
                cell.font = { name: 'Calibri', size: 11 };

                if (rowIndex === headerRow) {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: theme.header } };
                    cell.font = { name: 'Calibri', size: 11, bold: true };
                } else if (rowIndex === grandRow) {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: theme.grand } };
                    cell.font = { name: 'Calibri', size: 11, bold: true };
                } else if (colIndex === 1) {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: theme.firstCol } };
                    cell.font = { name: 'Calibri', size: 11, bold: true };
                }

                if (String(cell.value || '').includes('%')) {
                    cell.font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FFC0392B' } };
                }
            }
        }
    }

    function captureCurrentTableRows() {
        let table = document.getElementById('summaryTable');
        if (!table) return [];

        return Array.from(table.querySelectorAll('tr')).map(tr =>
            Array.from(tr.querySelectorAll('th,td')).map(cell => cell.innerText.trim() === '-' ? '' : cell.innerText.trim())
        );
    }

    function setWorksheetColumns(worksheet, rows) {
        let colCount = rows.reduce((max, row) => Math.max(max, row.length), 0);
        for (let colIndex = 1; colIndex <= colCount; colIndex++) {
            let maxLength = rows.reduce((max, row) => Math.max(max, String(row[colIndex - 1] || '').length), 0);
            worksheet.getColumn(colIndex).width = colIndex === 1 ? Math.min(Math.max(maxLength + 2, 16), 28) : Math.min(Math.max(maxLength + 2, 10), 16);
        }
        return colCount;
    }

    function appendReportBlockToWorksheet(worksheet, reportLabel, tableRows, reportType) {
        if (!tableRows.length) return null;

        let startRow = worksheet.rowCount + 1;
        worksheet.addRow([reportLabel]);
        worksheet.addRow([]);
        tableRows.forEach(row => worksheet.addRow(row));
        worksheet.addRow([]);

        let colCount = tableRows.reduce((max, row) => Math.max(max, row.length), 0);
        if (colCount > 1) {
            worksheet.mergeCells(startRow, 1, startRow, colCount);
        }
        styleReportBlock(worksheet, startRow, tableRows.length, colCount, reportType);
        return { startRow, colCount };
    }

    async function downloadAllReports() {
        if (!currentRows.length || !currentConfig) return;

        let definitions = getDefinitionsForReportType(activeReportType);
        let previousReportKey = activeReportKey;
        let usedNames = new Set();
        let workbook = new ExcelJS.Workbook();
        workbook.creator = 'Codex';
        workbook.created = new Date();

        definitions.forEach(def => {
            renderSelectedReport(def.key);
            let table = document.getElementById('summaryTable');
            if (!table) return;

            let tableRows = Array.from(table.querySelectorAll('tr')).map(tr =>
                Array.from(tr.querySelectorAll('th,td')).map(cell => cell.innerText.trim() === '-' ? '' : cell.innerText.trim())
            );
            let rows = [[def.label], [], ...tableRows];

            let sheetName = sanitizeWorksheetName(def.label, usedNames);
            let worksheet = workbook.addWorksheet(sheetName);
            rows.forEach(row => worksheet.addRow(row));

            let colCount = rows.reduce((max, row) => Math.max(max, row.length), 0);
            for (let colIndex = 1; colIndex <= colCount; colIndex++) {
                let maxLength = rows.reduce((max, row) => Math.max(max, String(row[colIndex - 1] || '').length), 0);
                worksheet.getColumn(colIndex).width = colIndex === 1 ? Math.min(Math.max(maxLength + 2, 16), 28) : Math.min(Math.max(maxLength + 2, 10), 16);
            }

            if (colCount > 1) {
                worksheet.mergeCells(1, 1, 1, colCount);
            }

            styleWorksheet(worksheet, rows.length, colCount, activeReportType);
        });

        renderSelectedReport(previousReportKey);

        let buffer = await workbook.xlsx.writeBuffer();
        let blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        let url = URL.createObjectURL(blob);
        let link = document.createElement('a');
        link.href = url;
        link.download = `${reportConfigs[activeReportType].label}_All_Reports.xlsx`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    async function downloadCombinedReports() {
        if (!loadedDataCache.import.rows.length || !loadedDataCache.export.rows.length) return;

        let workbook = new ExcelJS.Workbook();
        workbook.creator = 'Codex';
        workbook.created = new Date();
        let usedNames = new Set();

        let previousState = {
            activeReportType,
            activeReportKey,
            currentRows,
            currentConfig
        };

        const setActiveData = (reportType) => {
            activeReportType = reportType;
            currentRows = loadedDataCache[reportType].rows;
            currentConfig = loadedDataCache[reportType].config;
        };

        const addSingleReportSheet = (reportType, reportKey, customTitle = null) => {
            setActiveData(reportType);
            let def = getDefinitionsForReportType(reportType).find(item => item.key === reportKey);
            if (!def) return;

            renderSelectedReport(reportKey);
            let tableRows = captureCurrentTableRows();
            if (!tableRows.length) return;

            let reportTitle = customTitle || def.label;
            let rows = [[reportTitle], [], ...tableRows];
            let sheetName = sanitizeWorksheetName(reportTitle, usedNames);
            let worksheet = workbook.addWorksheet(sheetName);
            rows.forEach(row => worksheet.addRow(row));
            let colCount = setWorksheetColumns(worksheet, rows);

            if (colCount > 1) worksheet.mergeCells(1, 1, 1, colCount);
            styleWorksheet(worksheet, rows.length, colCount, reportType);
        };

        const addCombinedSheet = (sheetTitle, pairs) => {
            let sheetName = sanitizeWorksheetName(sheetTitle, usedNames);
            let worksheet = workbook.addWorksheet(sheetName);
            let combinedRows = [];

            pairs.forEach(pair => {
                setActiveData(pair.reportType);
                let def = getDefinitionsForReportType(pair.reportType).find(item => item.key === pair.reportKey);
                if (!def) return;

                renderSelectedReport(pair.reportKey);
                let tableRows = captureCurrentTableRows();
                if (!tableRows.length) return;

                let blockTitle = pair.customTitle || def.label;
                appendReportBlockToWorksheet(worksheet, blockTitle, tableRows, pair.reportType);
                combinedRows.push([blockTitle], [], ...tableRows, []);
            });

            if (!combinedRows.length) return;
            let colCount = setWorksheetColumns(worksheet, combinedRows);
            worksheet.views = [{ state: 'frozen', xSplit: 1, ySplit: 3 }];
        };

        addCombinedSheet('Volumes Handled IMPORT Export', [
            { reportType: 'import', reportKey: 'volumesCarrier' },
            { reportType: 'export', reportKey: 'exportLoaded' }
        ]);

        addCombinedSheet('Volumes Handled MSC & NON MSC', [
            { reportType: 'import', reportKey: 'volumesLine' },
            { reportType: 'export', reportKey: 'exportMscNonMsc' }
        ]);

        addCombinedSheet('Volumes Handled (KILARAIPUR OTHER)', [
            { reportType: 'import', reportKey: 'volumesPod', customTitle: 'Volumes Handled (KILARAIPUR/ OTHERS CFS)-Imports' },
            { reportType: 'export', reportKey: 'exportKilaraipur', customTitle: 'ICD Kilaraipur / Other CFS-Exports' }
        ]);
        addSingleReportSheet('import', 'shippingLineWise', 'Shipping Line Wise Report-Import');
        addSingleReportSheet('export', 'exportShippingLineWise', 'Shipping Line Wise (EXPORT)');
        addSingleReportSheet('import', 'commodity', 'Commodity Report- Imports');
        addSingleReportSheet('export', 'commodity', 'Commodity Report-Exports');
        addSingleReportSheet('import', 'importerWise', 'Importer Wise Report');
        addSingleReportSheet('export', 'topExporters', 'Top Exporters');
        addSingleReportSheet('import', 'chaWise', 'CHA Wise Report-Imports');
        addSingleReportSheet('export', 'topChaExports', 'Top CHA EXPORTS');

        activeReportType = previousState.activeReportType;
        activeReportKey = previousState.activeReportKey;
        currentRows = previousState.currentRows;
        currentConfig = previousState.currentConfig;
        renderReportButtons(activeReportType);
        renderSelectedReport(activeReportKey);

        let buffer = await workbook.xlsx.writeBuffer();
        let blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        let url = URL.createObjectURL(blob);
        let link = document.createElement('a');
        link.href = url;
        link.download = `Import_Export_Combine_Reports.xlsx`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function resetReportState(reportType) {
        activeReportType = reportType;
        activeReportKey = "commodity";
        currentRows = [];
        currentConfig = null;
        activeDownloadName = "Commodity_TEU_Summary";
        document.getElementById('loading').style.display = 'block';
        showLoadingOverlay(`${reportConfigs[reportType].label} file selected`);
        document.getElementById('output').innerHTML = '';
        document.getElementById('downloadBtn').style.display = 'none';
        document.getElementById('downloadAllBtn').style.display = 'none';
        document.getElementById('downloadCombinedBtn').style.display = loadedDataCache.import.rows.length && loadedDataCache.export.rows.length ? 'block' : 'none';
        document.getElementById('downloadOtherBtn').style.display = 'none';
        document.getElementById('reportToolbar').style.display = 'none';
        document.getElementById('dateRangeHeader').innerText = `${reportConfigs[reportType].label} report processing...`;
        otherItemsLog = {};
    }

    function loadWorkbookFile(file, reportType) {
        if (!file) return;

        let config = reportConfigs[reportType];
        resetReportState(reportType);

        let reader = new FileReader();

        reader.onprogress = function(progressEvent) {
            if (progressEvent.lengthComputable) {
                let percent = (progressEvent.loaded / progressEvent.total) * 70;
                updateLoadingProgress(percent, 'Reading file...');
            }
        };

        reader.onload = function(loadEvent) {
            try {
                animateLoadingTo(85, 'Parsing workbook...');
                let workbook = XLSX.read(loadEvent.target.result, {
                    type: 'array',
                    cellDates: true
                });

                let firstSheetName = workbook.SheetNames[0];
                let worksheet = workbook.Sheets[firstSheetName];
                let parsedRows = mapWorksheetRows(worksheet, config);

                currentRows = parsedRows;
                currentConfig = config;
                loadedDataCache[reportType] = { rows: parsedRows, config };
                activeReportKey = "commodity";
                animateLoadingTo(95, 'Generating reports...');
                renderReportButtons(reportType);
                renderSelectedReport('commodity');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('downloadAllBtn').style.display = 'block';
                document.getElementById('downloadCombinedBtn').style.display = loadedDataCache.import.rows.length && loadedDataCache.export.rows.length ? 'block' : 'none';
                hideLoadingOverlay();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('output').innerHTML = `<p style="color:#c0392b;font-weight:bold;">Unable to read the ${config.label.toLowerCase()} Excel file. Please upload a valid .xlsx or .xlsm file.</p>`;
                document.getElementById('dateRangeHeader').innerText = `${config.label} report failed to load`;
                hideLoadingOverlay();
            }
        };

        reader.readAsArrayBuffer(file);
    }

    document.getElementById('importFileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        loadWorkbookFile(file, 'import');
    });

    document.getElementById('exportFileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        loadWorkbookFile(file, 'export');
    });

    function downloadReport() {
        let table = document.getElementById("summaryTable");
        let rows = table.querySelectorAll("tr");
        let csvContent = [];

        let headerText = document.getElementById('dateRangeHeader').innerText;
        if (headerText) {
            csvContent.push('"' + headerText + '"');
            csvContent.push(""); 
        }

        for (let i = 0; i < rows.length; i++) {
            let row = [], cols = rows[i].querySelectorAll("td, th");
            for (let j = 0; j < cols.length; j++) {
                let cellData = cols[j].innerText.trim();
                if (cellData === '-') cellData = '0'; 
                row.push('"' + cellData + '"');
            }
            csvContent.push(row.join(","));
        }

        let csvString = csvContent.join("\n");
        let blob = new Blob([csvString], { type: "text/csv;charset=utf-8;" });
        
        let link = document.createElement("a");
        let url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `${reportConfigs[activeReportType].label}_${activeDownloadName}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function downloadOtherReport() {
        let otherArray = Object.values(otherItemsLog);
        otherArray.sort((a, b) => b.teus - a.teus);

        let csvContent = [];
        csvContent.push('"Total TEUs","COMMODITY"');

        otherArray.forEach(item => {
            let cleanComm = item.comm.replace(/"/g, '""');
            csvContent.push(`"${item.teus}","${cleanComm}"`);
        });

        let csvString = csvContent.join("\n");
        let blob = new Blob([csvString], { type: "text/csv;charset=utf-8;" });
        
        let link = document.createElement("a");
        let url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `${reportConfigs[activeReportType].label}_Uncategorized_OTHER_Items.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
